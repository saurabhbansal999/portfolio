<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fdf8f5"/>
    <stop offset="100%" stop-color="#f0e8df"/>
  </linearGradient>
  <radialGradient id="gl" cx="78%" cy="20%" r="65%">
    <stop offset="0%" stop-color="#7b4b2a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fdf8f5" stop-opacity="0"/>
    <stop offset="100%" stop-color="#fdf8f5" stop-opacity="0.88"/>
  </linearGradient>
</defs>

<rect width="1200" height="900" fill="url(#bg)"/>
<rect width="1200" height="900" fill="url(#gl)"/>

<!-- ECG / pulse line across right area -->
<polyline points="680,320 730,320 755,260 775,390 795,230 815,420 835,320 885,320 910,290 930,355 950,320 1100,320"
  fill="none" stroke="#7b4b2a" stroke-width="2" stroke-opacity="0.5" stroke-linejoin="round" stroke-linecap="round"/>

<!-- Medical cross (top-right) -->
<rect x="980" y="120" width="60" height="180" rx="10" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1.5"/>
<rect x="920" y="180" width="180" height="60" rx="10" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1.5"/>

<!-- Pulse ring anim hint -->
<circle cx="1010" cy="210" r="55" fill="none" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.2"/>
<circle cx="1010" cy="210" r="80" fill="none" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.1"/>

<!-- Aircraft silhouette (simple, lower right) -->
<ellipse cx="870" cy="470" rx="80" ry="18" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.3" stroke-width="1"/>
<polygon points="870,452 950,464 870,476" fill="#7b4b2a" fill-opacity="0.12"/>
<polygon points="800,460 830,452 830,480 800,472" fill="#7b4b2a" fill-opacity="0.1"/>

<!-- Card frame -->
<rect x="55" y="75" width="620" height="520" rx="16" fill="#7b4b2a" fill-opacity="0.04" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<text x="95" y="134" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.7" letter-spacing="0.12em">AIR AMBULANCE SYSTEM</text>

<text x="95" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="54" font-weight="700" fill="#1a0d05" letter-spacing="-0.03em">FAI Medical</text>

<text x="95" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">Full-stack transport platform covering mission</text>
<text x="95" y="276" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">control, clinical workflows and PDF reporting.</text>

<line x1="95" y1="302" x2="645" y2="302" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<rect x="95" y="320" width="92" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="141" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Laravel 11</text>

<rect x="195" y="320" width="60" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="225" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Vue 3</text>

<rect x="263" y="320" width="92" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="309" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Inertia.js</text>

<rect x="0" y="540" width="1200" height="360" fill="url(#fd)"/>
</svg>
