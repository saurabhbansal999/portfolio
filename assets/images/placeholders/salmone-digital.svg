<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fdf8f5"/>
    <stop offset="100%" stop-color="#f0e8df"/>
  </linearGradient>
  <radialGradient id="gl" cx="78%" cy="20%" r="65%">
    <stop offset="0%" stop-color="#7b4b2a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fdf8f5" stop-opacity="0"/>
    <stop offset="100%" stop-color="#fdf8f5" stop-opacity="0.88"/>
  </linearGradient>
</defs>

<rect width="1200" height="900" fill="url(#bg)"/>
<rect width="1200" height="900" fill="url(#gl)"/>

<!-- Hub-spoke network diagram -->
<!-- Spokes from center (920,320) -->
<line x1="920" y1="320" x2="780" y2="200" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="920" y1="320" x2="920" y2="165" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="920" y1="320" x2="1060" y2="200" stroke="#7b4b2a" stroke-width="2" stroke-opacity="0.35"/>
<line x1="920" y1="320" x2="1090" y2="340" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="920" y1="320" x2="1000" y2="455" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="920" y1="320" x2="810" y2="450" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.2"/>
<line x1="920" y1="320" x2="760" y2="345" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.15"/>
<!-- Highlight glow on main spoke -->
<line x1="920" y1="320" x2="1060" y2="200" stroke="#7b4b2a" stroke-width="6" stroke-opacity="0.07"/>
<!-- Outer nodes -->
<circle cx="780" cy="200" r="26" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.28" stroke-width="1.5"/>
<circle cx="920" cy="165" r="26" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.28" stroke-width="1.5"/>
<circle cx="1060" cy="200" r="32" fill="#7b4b2a" fill-opacity="0.32" stroke="#7b4b2a" stroke-opacity="0.7" stroke-width="2"/>
<circle cx="1090" cy="340" r="26" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.28" stroke-width="1.5"/>
<circle cx="1000" cy="455" r="26" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.28" stroke-width="1.5"/>
<circle cx="810" cy="450" r="26" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.28" stroke-width="1.5"/>
<circle cx="760" cy="345" r="26" fill="#7b4b2a" fill-opacity="0.06" stroke="#7b4b2a" stroke-opacity="0.22" stroke-width="1.5"/>
<!-- Central hub -->
<circle cx="920" cy="320" r="54" fill="#7b4b2a" fill-opacity="0.14" stroke="#7b4b2a" stroke-opacity="0.55" stroke-width="2"/>
<text x="920" y="328" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="22" font-weight="700" fill="#7b4b2a" fill-opacity="0.9">SD</text>

<!-- Card frame -->
<rect x="55" y="75" width="620" height="520" rx="16" fill="#7b4b2a" fill-opacity="0.04" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<text x="95" y="134" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.7" letter-spacing="0.12em">BRAND &amp; PARTNER PLATFORM</text>

<text x="95" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="48" font-weight="700" fill="#1a0d05" letter-spacing="-0.03em">Salmone Digital</text>

<text x="95" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">Brand website and partner management</text>
<text x="95" y="276" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">dashboard as a unified full-stack platform.</text>

<line x1="95" y1="302" x2="645" y2="302" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<rect x="95" y="320" width="72" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="131" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Laravel</text>

<rect x="175" y="320" width="66" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="208" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Vue.js</text>

<rect x="249" y="320" width="92" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="295" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Inertia.js</text>

<rect x="0" y="540" width="1200" height="360" fill="url(#fd)"/>
</svg>
