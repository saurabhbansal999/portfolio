<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fdf8f5"/>
    <stop offset="100%" stop-color="#f0e8df"/>
  </linearGradient>
  <radialGradient id="gl" cx="78%" cy="20%" r="65%">
    <stop offset="0%" stop-color="#7b4b2a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fdf8f5" stop-opacity="0"/>
    <stop offset="100%" stop-color="#fdf8f5" stop-opacity="0.88"/>
  </linearGradient>
</defs>

<rect width="1200" height="900" fill="url(#bg)"/>
<rect width="1200" height="900" fill="url(#gl)"/>

<!-- Water ripple rings -->
<ellipse cx="940" cy="450" rx="90" ry="26" fill="none" stroke="#7b4b2a" stroke-width="2" stroke-opacity="0.55"/>
<ellipse cx="940" cy="450" rx="170" ry="48" fill="none" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.38"/>
<ellipse cx="940" cy="450" rx="255" ry="72" fill="none" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.22"/>
<ellipse cx="940" cy="450" rx="340" ry="96" fill="none" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.12"/>

<!-- Fish body -->
<ellipse cx="940" cy="260" rx="115" ry="46" fill="#7b4b2a" fill-opacity="0.12" stroke="#7b4b2a" stroke-width="2" stroke-opacity="0.4"/>
<!-- Fish tail -->
<polygon points="825,260 785,222 785,298" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.35"/>
<!-- Dorsal fin -->
<path d="M 870,216 Q 930,175 1020,218" fill="#7b4b2a" fill-opacity="0.08" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.32"/>
<!-- Pectoral fin -->
<path d="M 900,260 Q 870,295 890,318 Q 930,295 900,260" fill="#7b4b2a" fill-opacity="0.08" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.28"/>
<!-- Eye -->
<circle cx="1030" cy="250" r="8" fill="#7b4b2a" fill-opacity="0.6"/>
<circle cx="1032" cy="248" r="3" fill="#1c1c2e"/>
<!-- Scale arcs -->
<path d="M 910,242 Q 930,262 910,280" fill="none" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.25"/>
<path d="M 950,238 Q 970,260 950,280" fill="none" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.25"/>
<path d="M 988,242 Q 1008,260 988,280" fill="none" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.2"/>

<!-- Club badge (top-right) -->
<circle cx="1070" cy="135" r="65" fill="#7b4b2a" fill-opacity="0.06" stroke="#7b4b2a" stroke-opacity="0.38" stroke-width="2"/>
<circle cx="1070" cy="135" r="50" fill="none" stroke="#7b4b2a" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 4"/>
<!-- Hook in badge -->
<path d="M 1070,97 L 1070,148 Q 1070,166 1090,166 Q 1106,166 1106,150" fill="none" stroke="#7b4b2a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>

<!-- Card frame -->
<rect x="55" y="75" width="620" height="520" rx="16" fill="#7b4b2a" fill-opacity="0.04" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<text x="95" y="134" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.7" letter-spacing="0.12em">CLUB MANAGEMENT PLATFORM</text>

<text x="95" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="52" font-weight="700" fill="#1a0d05" letter-spacing="-0.03em">Fishing Club</text>

<text x="95" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">Centralized operations with multi-role access,</text>
<text x="95" y="276" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">billing, catch diary and waters management.</text>

<line x1="95" y1="302" x2="645" y2="302" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<rect x="95" y="320" width="92" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="141" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Laravel 11</text>

<rect x="195" y="320" width="60" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="225" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Vue 3</text>

<rect x="263" y="320" width="80" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="303" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Passport</text>

<rect x="0" y="540" width="1200" height="360" fill="url(#fd)"/>
</svg>
