<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fdf8f5"/>
    <stop offset="100%" stop-color="#f0e8df"/>
  </linearGradient>
  <radialGradient id="gl" cx="78%" cy="20%" r="65%">
    <stop offset="0%" stop-color="#7b4b2a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fdf8f5" stop-opacity="0"/>
    <stop offset="100%" stop-color="#fdf8f5" stop-opacity="0.88"/>
  </linearGradient>
</defs>

<rect width="1200" height="900" fill="url(#bg)"/>
<rect width="1200" height="900" fill="url(#gl)"/>

<!-- Mountain peaks -->
<polygon points="720,510 840,270 960,510" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.2" stroke-width="1.5"/>
<polygon points="830,510 970,160 1110,510" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.28" stroke-width="2"/>
<polygon points="980,510 1060,285 1140,510" fill="#7b4b2a" fill-opacity="0.06" stroke="#7b4b2a" stroke-opacity="0.16" stroke-width="1.5"/>
<!-- Snow caps -->
<polygon points="828,292 840,270 852,292" fill="#7b4b2a" fill-opacity="0.22" stroke="#7b4b2a" stroke-opacity="0.4" stroke-width="1"/>
<polygon points="957,180 970,160 983,180" fill="#7b4b2a" fill-opacity="0.28" stroke="#7b4b2a" stroke-opacity="0.5" stroke-width="1"/>
<polygon points="1050,302 1060,285 1070,302" fill="#7b4b2a" fill-opacity="0.18" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<!-- Ground line -->
<line x1="710" y1="510" x2="1150" y2="510" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.15"/>

<!-- Fork (utensils above mountains) -->
<line x1="890" y1="125" x2="890" y2="250" stroke="#7b4b2a" stroke-width="2.5" stroke-opacity="0.5" stroke-linecap="round"/>
<line x1="880" y1="125" x2="880" y2="158" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
<line x1="887" y1="125" x2="887" y2="162" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
<line x1="893" y1="125" x2="893" y2="162" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
<line x1="900" y1="125" x2="900" y2="158" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.4" stroke-linecap="round"/>
<rect x="878" y="160" width="24" height="4" rx="2" fill="#7b4b2a" fill-opacity="0.35"/>
<!-- Knife -->
<line x1="936" y1="125" x2="936" y2="250" stroke="#7b4b2a" stroke-width="2.5" stroke-opacity="0.45" stroke-linecap="round"/>
<path d="M 936,125 Q 950,142 944,172 L 936,172" fill="#7b4b2a" fill-opacity="0.15" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.35"/>
<!-- Spoon -->
<line x1="980" y1="162" x2="980" y2="250" stroke="#7b4b2a" stroke-width="2.5" stroke-opacity="0.42" stroke-linecap="round"/>
<ellipse cx="980" cy="144" rx="12" ry="20" fill="#7b4b2a" fill-opacity="0.14" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.4"/>
<!-- Steam wisps -->
<path d="M 890,107 Q 880,90 890,72 Q 900,54 890,36" fill="none" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.18" stroke-linecap="round"/>
<path d="M 936,107 Q 924,88 936,70 Q 948,52 936,34" fill="none" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.15" stroke-linecap="round"/>

<!-- Card frame -->
<rect x="55" y="75" width="620" height="520" rx="16" fill="#7b4b2a" fill-opacity="0.04" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<text x="95" y="134" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.7" letter-spacing="0.12em">RESTAURANT · SWITZERLAND</text>

<text x="95" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="54" font-weight="700" fill="#1a0d05" letter-spacing="-0.03em">Delhi House</text>

<text x="95" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">Restaurant and cafe management platform</text>
<text x="95" y="276" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">with menus, reservations and admin panel.</text>

<line x1="95" y1="302" x2="645" y2="302" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<rect x="95" y="320" width="72" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="131" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Laravel</text>

<rect x="175" y="320" width="66" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="208" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Vue.js</text>

<rect x="249" y="320" width="62" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="280" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">MySQL</text>

<rect x="0" y="540" width="1200" height="360" fill="url(#fd)"/>
</svg>
