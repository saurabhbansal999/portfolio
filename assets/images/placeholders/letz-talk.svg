<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#fdf8f5"/>
    <stop offset="100%" stop-color="#f0e8df"/>
  </linearGradient>
  <radialGradient id="gl" cx="78%" cy="20%" r="65%">
    <stop offset="0%" stop-color="#7b4b2a" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="fd" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#fdf8f5" stop-opacity="0"/>
    <stop offset="100%" stop-color="#fdf8f5" stop-opacity="0.88"/>
  </linearGradient>
</defs>

<rect width="1200" height="900" fill="url(#bg)"/>
<rect width="1200" height="900" fill="url(#gl)"/>

<!-- Chat bubble 1 (large, sent) -->
<rect x="700" y="120" width="320" height="115" rx="18" fill="#7b4b2a" fill-opacity="0.12" stroke="#7b4b2a" stroke-opacity="0.38" stroke-width="1.5"/>
<polygon points="700,216 672,248 740,216" fill="#7b4b2a" fill-opacity="0.12"/>
<rect x="724" y="142" width="170" height="6" rx="3" fill="#7b4b2a" fill-opacity="0.38"/>
<rect x="724" y="156" width="250" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.22"/>
<rect x="724" y="169" width="210" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.18"/>
<rect x="724" y="182" width="230" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.14"/>
<rect x="724" y="200" width="55" height="4" rx="2" fill="#7b4b2a" fill-opacity="0.22"/>

<!-- Chat bubble 2 (medium, received) -->
<rect x="750" y="276" width="270" height="95" rx="16" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.25" stroke-width="1.5"/>
<polygon points="1020,276 1058,250 1040,276" fill="#7b4b2a" fill-opacity="0.07"/>
<rect x="772" y="297" width="140" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.28"/>
<rect x="772" y="311" width="210" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.18"/>
<rect x="772" y="325" width="180" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.14"/>
<rect x="772" y="348" width="48" height="4" rx="2" fill="#7b4b2a" fill-opacity="0.2"/>

<!-- Chat bubble 3 (small) -->
<rect x="710" y="395" width="200" height="75" rx="14" fill="#7b4b2a" fill-opacity="0.07" stroke="#7b4b2a" stroke-opacity="0.2" stroke-width="1"/>
<rect x="728" y="414" width="120" height="5" rx="2.5" fill="#7b4b2a" fill-opacity="0.25"/>
<rect x="728" y="428" width="160" height="4" rx="2" fill="#7b4b2a" fill-opacity="0.16"/>
<rect x="728" y="450" width="40" height="3" rx="1.5" fill="#7b4b2a" fill-opacity="0.18"/>

<!-- Typing dots -->
<circle cx="730" cy="500" r="5" fill="#7b4b2a" fill-opacity="0.4"/>
<circle cx="748" cy="500" r="5" fill="#7b4b2a" fill-opacity="0.25"/>
<circle cx="766" cy="500" r="5" fill="#7b4b2a" fill-opacity="0.15"/>

<!-- Sound waves (top right) -->
<path d="M 1060,168 Q 1082,152 1060,134" fill="none" stroke="#7b4b2a" stroke-width="2" stroke-opacity="0.38"/>
<path d="M 1072,178 Q 1102,158 1072,126" fill="none" stroke="#7b4b2a" stroke-width="1.5" stroke-opacity="0.24"/>
<path d="M 1084,188 Q 1122,164 1084,118" fill="none" stroke="#7b4b2a" stroke-width="1" stroke-opacity="0.14"/>

<!-- Card frame -->
<rect x="55" y="75" width="620" height="520" rx="16" fill="#7b4b2a" fill-opacity="0.04" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<text x="95" y="134" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.7" letter-spacing="0.12em">AI TRAINING PLATFORM</text>

<text x="95" y="200" font-family="'Segoe UI',Arial,sans-serif" font-size="54" font-weight="700" fill="#1a0d05" letter-spacing="-0.03em">Let'z Talk</text>

<text x="95" y="254" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">AI-assisted scenario training with text and audio</text>
<text x="95" y="276" font-family="'Segoe UI',Arial,sans-serif" font-size="17" font-weight="400" fill="#5a3820" fill-opacity="1">conversations, trainer review and PDF exports.</text>

<line x1="95" y1="302" x2="645" y2="302" stroke="#7b4b2a" stroke-opacity="0.15" stroke-width="1"/>

<rect x="95" y="320" width="92" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="141" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Laravel 11</text>

<rect x="195" y="320" width="60" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="225" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">Vue 3</text>

<rect x="263" y="320" width="66" height="28" rx="14" fill="#7b4b2a" fill-opacity="0.1" stroke="#7b4b2a" stroke-opacity="0.35" stroke-width="1"/>
<text x="296" y="339" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" font-weight="600" fill="#7b4b2a" fill-opacity="0.85">OpenAI</text>

<rect x="0" y="540" width="1200" height="360" fill="url(#fd)"/>
</svg>
