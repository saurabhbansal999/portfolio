<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#09090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="28%" r="65%">
      <stop offset="0%"   stop-color="#7b4b2a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#7b4b2a" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#5a3820" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7b4b2a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Warm brown glow -->
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>
  <!-- Border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none"
        stroke="url(#border)" stroke-width="1.5"/>

  <!-- SB text -->
  <text dominant-baseline="middle" text-anchor="middle"
        x="29" y="33"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="24" font-weight="900" letter-spacing="-0.5">
    <tspan fill="#7b4b2a">S</tspan><tspan fill="#f4f4f8">B</tspan>
  </text>

  <!-- Perfect circle dot — same vertical centre as the text -->
  <circle cx="50" cy="33" r="2.8" fill="#7b4b2a"/>
</svg>
